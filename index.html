<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCR Extraction System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        select, input[type="text"], input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        select:focus, input[type="text"]:focus, input[type="file"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input[type="file"] {
            padding: 10px;
            cursor: pointer;
        }

        .file-info {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .clear-btn {
            background: #f5f5f5;
            color: #333;
            border: 2px solid #e0e0e0;
        }

        .clear-btn:hover {
            background: #efefef;
        }

        .results {
            margin-top: 40px;
            display: none;
        }

        .results.show {
            display: block;
        }

        .results-header {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .result-item {
            background: #f8f9fa;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
            border-radius: 3px;
        }

        .result-label {
            color: #666;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .result-value {
            color: #333;
            font-size: 14px;
            word-break: break-word;
        }

        .success {
            background: #d4edda;
            border-left-color: #28a745;
            color: #155724;
        }

        .error {
            background: #f8d7da;
            border-left-color: #dc3545;
            color: #721c24;
        }

        .info {
            background: #d1ecf1;
            border-left-color: #17a2b8;
            color: #0c5460;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-size: 14px;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .section-divider {
            height: 1px;
            background: #e0e0e0;
            margin: 30px 0;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 24px;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📄 OCR Extraction System</h1>
        <p class="subtitle">Extract details from various documents</p>

        <form id="extractionForm">
            <div class="form-group">
                <label for="docType">Document Type *</label>
                <select id="docType" required>
                    <option value="">-- Select Document Type --</option>
                    <option value="passport">Passport</option>
                    <option value="visa">Visa</option>
                    <option value="eid">Emirates ID</option>
                    <option value="driving_license">Driving License</option>
                    <option value="evisa">E-Visa</option>
                    <option value="medical">Medical Fitness</option>
                    <option value="eid_application">EID Application</option>
                    <option value="mol_mb">MOL (MB Number)</option>
                    <option value="mol_st">MOL (ST Number)</option>
                    <option value="status_change">Status Change</option>
                    <option value="insurance">Insurance Card</option>
                </select>
            </div>

            <div class="form-group">
                <label for="fileInput">Upload Document *</label>
                <input type="file" id="fileInput" accept=".jpg,.jpeg,.png,.pdf" required>
                <div class="file-info">Supported formats: JPG, JPEG, PNG, PDF</div>
            </div>

            <div class="form-group">
                <label for="tokenInput">Authorization Token *</label>
                <input type="text" id="tokenInput" placeholder="Enter your API token" required>
            </div>

            <div class="button-group">
                <button type="submit" class="submit-btn">Extract Details</button>
                <button type="button" class="clear-btn" onclick="resetForm()">Clear</button>
            </div>
        </form>

        <div id="results" class="results">
            <div class="results-header">Extraction Results</div>
            <div id="resultsContent"></div>
        </div>
    </div>

    <script>
        // Automatically detect the API URL based on the current host
        const API_BASE_URL = window.location.origin;

        const docTypeEndpoints = {
            'passport': '/extract_passport_details',
            'visa': '/extract_visa_details',
            'eid': '/extract_eid_details',
            'driving_license': '/extract_dl_details',
            'evisa': '/extract_evisa_details',
            'medical': '/extract_medical_details',
            'eid_application': '/extract_eid_application_details',
            'mol_mb': '/extract_mol_mb_details',
            'mol_st': '/extract_mol_st_details',
            'status_change': '/extract_change_status_details',
            'insurance': '/extract_insurance_details'
        };

        document.getElementById('extractionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            await extractDetails();
        });

        async function extractDetails() {
            const docType = document.getElementById('docType').value;
            const fileInput = document.getElementById('fileInput');
            const token = document.getElementById('tokenInput').value;

            if (!docType || !fileInput.files[0] || !token) {
                showResult('Please fill all required fields', 'error');
                return;
            }

            const submitBtn = document.querySelector('.submit-btn');
            submitBtn.disabled = true;
            showLoading();

            try {
                const formData = new FormData();
                formData.append('image', fileInput.files[0]);

                const endpoint = docTypeEndpoints[docType];
                const response = await fetch(`${API_BASE_URL}${endpoint}`, {
                    method: 'POST',
                    headers: {
                        'Authorization': token
                    },
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    displayResults(data);
                } else {
                    showResult(data.detail || data.msg || 'Extraction failed', 'error');
                }
            } catch (error) {
                showResult(`Error: ${error.message}. Make sure the API server is running at ${API_BASE_URL}`, 'error');
            } finally {
                submitBtn.disabled = false;
            }
        }

        function displayResults(data) {
            const resultsDiv = document.getElementById('results');
            const resultsContent = document.getElementById('resultsContent');
            resultsContent.innerHTML = '';

            if (data.sts === 200 && data.data) {
                const extractedData = data.data;
                const resultsHtml = Object.entries(extractedData)
                    .map(([key, value]) => `
                        <div class="result-item success">
                            <div class="result-label">${formatLabel(key)}</div>
                            <div class="result-value">${escapeHtml(String(value))}</div>
                        </div>
                    `)
                    .join('');
                resultsContent.innerHTML = resultsHtml;
            } else {
                resultsContent.innerHTML = `<div class="result-item error">${data.msg || 'Extraction failed'}</div>`;
            }

            resultsDiv.classList.add('show');
        }

        function showResult(message, type = 'info') {
            const resultsDiv = document.getElementById('results');
            const resultsContent = document.getElementById('resultsContent');
            resultsContent.innerHTML = `<div class="result-item ${type}">${message}</div>`;
            resultsDiv.classList.add('show');
        }

        function showLoading() {
            const resultsDiv = document.getElementById('results');
            const resultsContent = document.getElementById('resultsContent');
            resultsContent.innerHTML = '<div class="loading"><span class="spinner"></span>Processing...</div>';
            resultsDiv.classList.add('show');
        }

        function formatLabel(key) {
            return key
                .replace(/_/g, ' ')
                .split(' ')
                .map(word => word.charAt(0).toUpperCase() + word.slice(1))
                .join(' ');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function resetForm() {
            document.getElementById('extractionForm').reset();
            document.getElementById('results').classList.remove('show');
        }

        // File input change handler to show file name
        document.getElementById('fileInput').addEventListener('change', (e) => {
            const fileName = e.target.files[0]?.name || 'No file selected';
            const fileInfo = document.querySelector('.file-info');
            fileInfo.textContent = `Selected: ${fileName} | Supported formats: JPG, JPEG, PNG, PDF`;
        });
    </script>
</body>
</html>
